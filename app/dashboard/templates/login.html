<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mini SIEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1mVECmFAhee/15LHoGSHFRvFk2p6AK"
          crossorigin="anonymous">
    <style>
        body {
            background-color: #0f1923;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #1a2535;
            border: 1px solid #2d3f55;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .login-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: 1px;
        }
        .form-control {
            background-color: #1f2d42;
            border-color: #2d3f55;
            color: #e2e8f0;
        }
        .form-control:focus {
            background-color: #1f2d42;
            border-color: #60a5fa;
            color: #e2e8f0;
            box-shadow: 0 0 0 0.2rem rgba(96,165,250,0.2);
        }
        .form-label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-login {
            background-color: #60a5fa;
            border-color: #60a5fa;
            color: #0f1923;
            font-weight: 600;
            width: 100%;
        }
        .btn-login:hover { background-color: #93c5fd; border-color: #93c5fd; color: #0f1923; }
        .alert-danger { background-color: rgba(248,113,113,0.15); border-color: #f87171; color: #fca5a5; }
        .divider { border-color: #2d3f55; }
        .hint-text { color: #64748b; font-size: 0.78rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-brand">&#9655; Mini SIEM</div>
            <div class="text-muted small mt-1">Security Information &amp; Event Management</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} mb-3" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('dashboard.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="admin" autocomplete="username" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-login">Sign In</button>
        </form>

        <hr class="divider mt-4 mb-3">
        <p class="hint-text text-center mb-0">Mini SIEM &mdash; Portfolio Security Project</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
