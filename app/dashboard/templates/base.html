<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini SIEM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1mVECmFAhee/15LHoGSHFRvFk2p6AK"
          crossorigin="anonymous">
    <style>
        :root {
            --siem-bg: #0d1117;
            --siem-card: #161b22;
            --siem-border: #30363d;
            --siem-accent: #58a6ff;
            --sev-critical: #f85149;
            --sev-high: #d29922;
            --sev-medium: #e3b341;
            --sev-low: #3fb950;
        }
        body {
            background-color: var(--siem-bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .navbar { background-color: var(--siem-card) !important; border-bottom: 1px solid var(--siem-border); }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .card { background-color: var(--siem-card); border: 1px solid var(--siem-border); }
        .stat-card { transition: transform 0.15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-number { font-size: 2.25rem; font-weight: 700; }

        .badge-critical { background-color: var(--sev-critical); }
        .badge-high     { background-color: var(--sev-high); color: #000; }
        .badge-medium   { background-color: var(--sev-medium); color: #000; }
        .badge-low      { background-color: var(--sev-low); color: #000; }

        .table { --bs-table-bg: transparent; }
        .table thead th { border-color: var(--siem-border); color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { border-color: var(--siem-border); vertical-align: middle; font-size: 0.9rem; }
        .msg-cell { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .filter-form .form-select { background-color: var(--siem-card); border-color: var(--siem-border); color: #c9d1d9; }
        .footer { color: #484f58; font-size: 0.8rem; padding: 1.5rem 0; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand text-info" href="/">&#9655; Mini SIEM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/events">Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="/alerts">Alerts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rules">Rules</a></li>
                </ul>
                <span class="navbar-text text-secondary small">Security Information &amp; Event Management</span>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer text-center">
        Mini SIEM &mdash; Portfolio Project &mdash; Python / Flask / SQLite
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
